version: "3.9"

# ══════════════════════════════════════════════════════════════
#  Portainer Stack — NEU Knowledge Graph
#
#  Cách dùng trên Portainer:
#  1. Stacks → Add Stack → Web editor
#  2. Dán nội dung file này vào
#  3. Kéo xuống "Environment variables" và điền các giá trị bên dưới
#  4. Deploy the stack
#
#  Biến môi trường cần thiết khi deploy trên Portainer UI:
#    NEO4J_PASSWORD     = <mật khẩu mạnh, ví dụ: Neu@Graph2025!>
#    OPENAI_API_KEY     = sk-proj-...
#    MINIO_ACCESS_KEY   = course2
#    MINIO_SECRET_KEY   = course2-s3-uiauia
# ══════════════════════════════════════════════════════════════

networks:
  neu_net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:

services:

  neo4j:
    image: neo4j:5.18-community
    container_name: neu_neo4j
    restart: unless-stopped
    networks: [neu_net]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist:    "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size:     "1g"
      NEO4J_dbms_memory_pagecache_size:     "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    # Trên Portainer, build từ Git repository hoặc upload image sẵn
    # Nếu dùng image đã build sẵn:
    image: neu-kg-api:latest          # đổi thành image name bạn build
    # Nếu muốn build từ Git:
    # build:
    #   context: https://github.com/<your-org>/<your-repo>.git
    container_name: neu_api
    restart: unless-stopped
    networks: [neu_net]
    ports:
      - "8000:8000"
    environment:
      DB_URL:          "bolt://neo4j:7687"
      DB_USER:         "neo4j"
      DB_PASSWORD:     "${NEO4J_PASSWORD}"
      OPENAI_API_KEY:  "${OPENAI_API_KEY}"
      OPENAI_MODEL:    "gpt-4o-mini"
      MINIO_ENDPOINT:  "203.113.132.48:8008"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_SECURE:    "false"
      MINIO_BUCKET:    "syllabus"
      MINIO_BASE_FOLDER: "courses-processed"
      MAX_HOPS:        "3"
      TOP_K:           "15"
    depends_on:
      neo4j:
        condition: service_healthy
